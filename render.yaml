# FlowStateASL / ASL Express - Render Blueprint
# https://docs.render.com/blueprint-spec

databases:
  - name: flowstateasl-db
    databaseName: flowstateasl
    plan: free  # Free tier; upgrade to starter for production

services:
  - type: web
    name: flowstateasl
    runtime: node
    region: oregon

    # App at repo root - build sequentially to reduce memory on free tier
    buildCommand: npm ci --include=dev && npm run build:api && npm run build:web
    # Nx (@nx/js:tsc) compiles apps/api/src → dist/apps/api/src/ (see apps/api/tsconfig.json)
    startCommand: node dist/apps/api/src/main.js

    # Must match compiled output path above — do not use dist/apps/api/data/ (no such file)
    preDeployCommand: npx typeorm migration:run -d dist/apps/api/src/data/data-source.js

    healthCheckPath: /  # SPA root returns 200

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1400
      - key: NX_DAEMON
        value: "false"
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: flowstateasl-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://flowstateasl.onrender.com  # Update after first deploy if you use a custom domain
      - key: FRONTEND_URL
        value: https://flowstateasl.onrender.com
